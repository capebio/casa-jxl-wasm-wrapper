[package]
name = "raw-converter-wasm"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
# A2: enable rayon parallelism in the RAW pipeline for WASM (requires COOP/COEP, already required by libjxl MT)
parallel-wasm = ["raw-pipeline/parallel", "dep:wasm-bindgen-rayon"]

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["Window", "Performance", "WorkerGlobalScope"] }
raw-pipeline = { path = "crates/raw-pipeline", default-features = false }
wasm-bindgen-rayon = { version = "1", optional = true }

# Native-only: JXL encode+decode for raw_decode_bench. Excluded from WASM builds
# via target guard (wasm-pack only builds the [lib] cdylib, not [[bin]] targets,
# but the guard prevents any accidental wasm32 compilation of vendored libjxl).
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
jpegxl-rs = { version = "0.10", features = ["vendored"] }
# Low-level libjxl for native progressive (FRAME_PROGRESSION / FlushImage / SetProgressiveDetail)
# and ROI crop (JxlDecoderSetCropEnabled + SetImageOutBuffer) in parity harness / Tauri paths.
jpegxl-sys = { version = "0.10", features = ["vendored"] }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
debug = false
