[target.wasm32-unknown-unknown]
rustflags = ["-C", "target-feature=+simd128"]

[env]
LLVMInstallDir = "C:/Program Files/LLVM"
LLVMToolsVersion = "22"
LIBJXL_SOURCE_DIR = "C:/Foo/raw-converter-wasm/external/libjxl"
# bindgen (jxl-ffi build.rs) needs libclang to parse the libjxl headers.
LIBCLANG_PATH = "C:/Program Files/LLVM/bin"
