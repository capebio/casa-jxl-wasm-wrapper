<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:," />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pyramid Gallery (M1 grid)</title>
  <link rel="stylesheet" href="./jxl-debug-console.css" />
  <script type="importmap">
  {
    "imports": {
      "@casabio/jxl-core":             "../packages/jxl-core/dist/index.js",
      "@casabio/jxl-core/errors":      "../packages/jxl-core/dist/errors.js",
      "@casabio/jxl-core/protocol":    "../packages/jxl-core/dist/protocol.js",
      "@casabio/jxl-core/types":       "../packages/jxl-core/dist/types.js",
      "@casabio/jxl-wasm":             "../packages/jxl-wasm/dist/index.js",
      "@casabio/jxl-worker-browser":   "../packages/jxl-worker-browser/dist/index.js",
      "@casabio/jxl-session":          "../packages/jxl-session/dist/index.js",
      "@casabio/jxl-scheduler":        "../packages/jxl-scheduler/dist/index.js",
      "@casabio/jxl-capabilities":     "../packages/jxl-capabilities/dist/index.js",
      "@casabio/jxl-policy":           "../packages/jxl-policy/dist/index.js"
    }
  }
  </script>
  <link rel="stylesheet" href="./test-nav.css" />
  <link rel="stylesheet" href="./jxl-dashboard.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; background: #111; color: #eee; }
    .bar { display: flex; gap: .75rem; align-items: center; flex-wrap: wrap; padding: .75rem 1rem; background: #1a1a1a; border-bottom: 1px solid #2a2a2a; }
    .bar input, .bar button { font: inherit; padding: .35rem .6rem; background: #222; color: #eee; border: 1px solid #444; border-radius: 4px; }
    .bar button { cursor: pointer; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; padding: 12px; }
    .tile { position: relative; background: #1a1a1a; border: 1px solid #333; overflow: hidden; border-radius: 3px; }
    .tile canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; background: #222; }
    .tile .label { position: absolute; bottom: 0; left: 0; right: 0; font-size: 10px; background: rgba(0,0,0,.6); padding: 1px 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tile .level { position: absolute; top: 2px; right: 2px; font-size: 9px; background: rgba(0,0,0,.7); padding: 0 3px; border-radius: 2px; }
    .status { padding: 8px 12px; font-size: .85rem; color: #888; }
    .controls { margin-left: auto; display: flex; gap: .5rem; align-items: center; }
  </style>
</head>
<body>
  <div class="bar">
    <span style="font-weight:600">Pyramid M1 Grid</span>
    <input id="base" type="text" value="pyramid-out" placeholder="base dir or url (e.g. pyramid-out or http://...)" style="width:260px" />
    <button id="load-btn">Load index + seed grid</button>
    <div class="controls">
      <label style="font-size:.8rem"><input id="dpr-up" type="checkbox" checked /> DPR upgrades</label>
      <span id="status" class="status">idle</span>
    </div>
    <a href="./index.html" style="margin-left:1rem; color:#6b9; font-size:.8rem">← back</a>
  </div>
  <div id="grid" class="grid"></div>
  <script type="module" src="./pyramid-gallery.js"></script>
</body>
</html>
