<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Pyramid Gallery Grid — M1</title>
<style>
body { font:14px/1.4 system-ui, sans-serif; background:#0a0a0a; color:#ddd; margin:0; padding:12px; }
#controls { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
input[type=text], button { background:#222; color:#ddd; border:1px solid #444; padding:4px 8px; }
[data-pyramid-grid] { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:6px; background:#111; padding:6px; min-height:320px; border-radius:4px; }
.pyramid-card { background:#1a1a1a; border-radius:3px; box-shadow:0 1px 3px rgba(0,0,0,.6); }
#pyramid-status { font:11px/1.2 monospace; color:#888; margin:4px 0; }
</style>
</head>
<body>
<h3>Pyramid Gallery Grid (L0 seed + monotonic upgrades via scheduler one-shot keyed by contenthash)</h3>
<div id="controls">
  <label>base url: <input id="pyramid-base" type="text" placeholder="http://localhost:8080/out" size="36"></label>
  <label>or dir: <input id="pyramid-dir" type="file" webkitdirectory multiple></label>
  <button id="pyramid-decode-btn">Load / Decode</button>
  <span style="color:#555">ring [ / ] | dpr auto</span>
</div>
<div id="pyramid-status">ready — pick ingest --out dir or set base url then Load</div>
<div data-pyramid-grid></div>
<script type="module" src="./pyramid-gallery-grid.js"></script>
</body>
</html>
