<body class="has-home-bar" data-mode="preset-benchmark">
    <nav class="home-bar" aria-label="Test pages">
        <div class="home-bar-label">Test pages</div>
        <div class="home-bar-links">

        <section class="hero compact">

            <h2>&#9312; File intake</h2>

            <h2>&#9313; Sweep settings</h2>

            <div class="phase-cards" id="phase-cards"></div>
            <div class="live-status" id="live-status" aria-live="polite" aria-atomic="false"></div>
        </section>

        <section id="phase-graphs">
            <h2>&#9315; Phase graphs</h2>
            <div id="phase-graphs-body"></div>
        </section>

        <section id="results-table">
            <h2>&#9316; Raw results</h2>

        </section>

        <section id="preset-cards">
            <h2>&#9317; Presets</h2>
            <div class="preset-cards-grid" id="preset-cards-grid"></div>
        </section>
