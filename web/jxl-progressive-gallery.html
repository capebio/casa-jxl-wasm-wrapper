<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:," />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Progressive JXL Gallery</title>
  <link rel="stylesheet" href="./test-nav.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: #111;
      color: #eee;
    }

    /* ── Picker ─────────────────────────────────────────────────── */
    .picker-bar {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
      padding: 0.75rem 1rem;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
    }

    .file-pick-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.9rem;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #eee;
      font-size: 0.875rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .file-pick-btn:hover { background: #333; }

    #source-input { display: none; }

    .picker-status {
      font-size: 0.8rem;
      color: #888;
    }

    #concurrent-label {
      margin-left: auto;
      font-size: 0.8rem;
      color: #888;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    #concurrent-label input[type=range] { width: 80px; }

    /* ── Gallery grid ───────────────────────────────────────────── */
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 4px;
      padding: 4px;
    }

    .slot {
      position: relative;
      background: #1a1a1a;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      border-radius: 2px;
    }

    .slot canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }

    .slot .badge {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0, 0, 0, 0.75);
      color: #0f0;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: monospace;
      pointer-events: none;
    }
    .slot .badge.tier-dc    { color: #fa0; }
    .slot .badge.tier-pass  { color: #8cf; }
    .slot .badge.tier-full  { color: #0f0; }
    .slot .badge.tier-error { color: #f55; }

    .slot .filename {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.6);
      color: #ccc;
      font-size: 10px;
      font-family: monospace;
      padding: 2px 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    .slot .spinner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #555;
    }

    /* ── Log ────────────────────────────────────────────────────── */
    #log {
      margin: 0.5rem 1rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 0.4rem 0.6rem;
      max-height: 120px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 11px;
      color: #888;
    }
  </style>
</head>
<body class="has-home-bar" data-mode="progressive-gallery">
  <nav class="home-bar" aria-label="Test pages">
    <div class="home-bar-label">Test pages</div>
    <div class="home-bar-links">
      <a class="home-bar-link" href="./index.html">Home</a>
      <a class="home-bar-link" href="./jxl-progressive.html">Progressive decode</a>
      <a class="home-bar-link" href="./jxl-wrapper-lab.html">Wrapper lab</a>
      <a class="home-bar-link" href="./jxl-compare.html">Compare</a>
      <a class="home-bar-link" href="./jxl-benchmark.html">Benchmark</a>
      <a class="home-bar-link" href="./jxl-progressive-paint.html">Progressive paint</a>
      <a class="home-bar-link is-active" href="./jxl-progressive-gallery.html" aria-current="page">Progressive gallery</a>
      <a class="home-bar-link" href="./jxl-crop-benchmark.html">Crop benchmark</a>
    </div>
  </nav>

  <div class="picker-bar">
    <label class="file-pick-btn" for="source-input">
      📂 Pick JXL files
    </label>
    <input id="source-input" type="file" multiple accept=".jxl,.JXL" />
    <span class="picker-status" id="picker-status">No files selected</span>
    <label id="concurrent-label">
      Concurrent
      <input type="range" id="concurrent" min="1" max="8" value="4" />
      <span id="concurrent-val">4</span>
    </label>
  </div>

  <div id="gallery"></div>
  <div id="log"></div>

  <script type="module" src="./jxl-progressive-gallery.js"></script>
</body>
</html>
