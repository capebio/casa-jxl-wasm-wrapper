[package]
name = "jxl-ffi"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Clean-room BSD FFI bindings to libjxl (native only). Generated by bindgen from the BSD-3 libjxl C headers in external/libjxl; links statically against our own libjxl build. No GPL."

# Native only. The WASM JXL path stays on web/pkg + bridge.cpp (separate, already BSD).
[lib]
crate-type = ["rlib"]

[build-dependencies]
bindgen = "0.71"
cmake = "0.1"
